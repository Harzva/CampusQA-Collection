apiVersion: v1
kind: Secret
metadata:
  name: campus-agent-qa-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: replace-me
  MYSQL_ROOT_PASSWORD: replace-me
  SPRING_DATASOURCE_PASSWORD: replace-me
  MINIO_ROOT_PASSWORD: replace-me
  MINIO_SECRET_KEY: replace-me
  API_AUTH_TOKENS: "admin|replace-me-admin-token|default|ADMIN,USER;user|replace-me-user-token|default|USER"
  BOT_SIGNING_SECRET: replace-me-long-random-secret
  BOT_FEISHU_VERIFICATION_TOKEN: replace-me
  BOT_FEISHU_SIGNING_SECRET: replace-me
  BOT_DINGTALK_TOKEN: replace-me
  BOT_DINGTALK_SIGNING_SECRET: replace-me
  BOT_WECHAT_TOKEN: replace-me
  BOT_WECHAT_SIGNING_SECRET: replace-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: campus-agent-qa-config
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rag?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
  SPRING_DATASOURCE_USERNAME: root
  SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_BASELINE_VERSION: "0"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: "6379"
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION_NAME: rag_collection
  MILVUS_EMBEDDING_DIMENSION: "1536"
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_BUCKET: rag-bucket
  OPENAI_CHAT_MODEL: gpt-4o-mini
  OPENAI_EMBEDDING_MODEL: text-embedding-3-small
  API_AUTH_ENABLED: "true"
  MANAGEMENT_HEALTH_SHOW_DETAILS: never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-agent-qa-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-agent-qa-backend
  template:
    metadata:
      labels:
        app: campus-agent-qa-backend
    spec:
      terminationGracePeriodSeconds: 35
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/harzva/campus-agent-qa-backend:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: BOT_ENABLED
              value: "true"
            - name: BOT_DEFAULT_MODE
              value: agent
            - name: BOT_FEISHU_ENABLED
              value: "true"
            - name: BOT_DINGTALK_ENABLED
              value: "true"
            - name: BOT_WECHAT_ENABLED
              value: "true"
            - name: BOT_FEISHU_ALLOWED_MODES
              value: rag,wiki,agent,gbrain
            - name: BOT_DINGTALK_ALLOWED_MODES
              value: rag,wiki,agent,gbrain
            - name: BOT_WECHAT_ALLOWED_MODES
              value: rag,wiki,agent,gbrain
            - name: BOT_IDEMPOTENCY_ENABLED
              value: "true"
            - name: BOT_IDEMPOTENCY_TTL_SECONDS
              value: "600"
            - name: BOT_RATE_LIMIT_ENABLED
              value: "true"
            - name: BOT_RATE_LIMIT_MAX_PER_MINUTE
              value: "60"
            - name: BOT_RATE_LIMIT_WINDOW_SECONDS
              value: "60"
          envFrom:
            - configMapRef:
                name: campus-agent-qa-config
            - secretRef:
                name: campus-agent-qa-secrets
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: campus-agent-qa-backend
spec:
  selector:
    app: campus-agent-qa-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
