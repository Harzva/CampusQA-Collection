spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/rag?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

milvus:
  host: ${MILVUS_HOST:milvus}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION_NAME:rag_collection}
  embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1536}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:rag-bucket}

openai:
  api-key: ${OPENAI_API_KEY:dummy}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
