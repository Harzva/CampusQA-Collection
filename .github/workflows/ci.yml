name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx768m -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=128m

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn -B test

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config

  golden:
    name: Golden QA regression
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/run_golden_eval.py eval/golden/golden_cases.json

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [frontend, backend, compose, golden]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --pull -t campus-agent-qa-backend:${{ github.sha }} ./backend
      - run: docker build --pull -t campus-agent-qa-frontend:${{ github.sha }} ./frontend
