version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rag}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Milvus requires both etcd and MinIO for metadata and object storage. We run
  # Milvus in standalone mode which bundles query, data and index services.
  milvus:
    image: milvusdb/milvus:v2.4.0
    restart: always
    ports:
      - "19530:19530"  # gRPC API
      - "19121:19121"  # HTTP/REST API
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_LOG_LEVEL: info
    depends_on:
      - etcd
      - minio
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus-data:/var/lib/milvus
      - milvus-conf:/etc/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: always
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    command: ["etcd", "-advertise-client-urls", "http://0.0.0.0:2379", "-listen-client-urls", "http://0.0.0.0:2379"]
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data

  minio:
    image: minio/minio:RELEASE.2024-03-25T07-52-55Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # Spring Boot picks up these variables automatically; they override values in application.yml
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rag}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-0}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_REDIS_HOST: redis
      MANAGEMENT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_HEALTH_SHOW_DETAILS:-never}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      API_AUTH_TOKENS: "${API_AUTH_TOKENS:-admin|change-me-admin-token|default|ADMIN,USER}"
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-rag_collection}
      MILVUS_EMBEDDING_DIMENSION: ${MILVUS_EMBEDDING_DIMENSION:-1536}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-bucket}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      BOT_ENABLED: ${BOT_ENABLED:-false}
      BOT_DEFAULT_MODE: ${BOT_DEFAULT_MODE:-agent}
      BOT_SIGNING_SECRET: ${BOT_SIGNING_SECRET:-change-me-long-random-secret}
      BOT_TIMESTAMP_TOLERANCE_SECONDS: ${BOT_TIMESTAMP_TOLERANCE_SECONDS:-300}
      BOT_IDEMPOTENCY_ENABLED: ${BOT_IDEMPOTENCY_ENABLED:-true}
      BOT_IDEMPOTENCY_TTL_SECONDS: ${BOT_IDEMPOTENCY_TTL_SECONDS:-600}
      BOT_RATE_LIMIT_ENABLED: ${BOT_RATE_LIMIT_ENABLED:-true}
      BOT_RATE_LIMIT_MAX_PER_MINUTE: ${BOT_RATE_LIMIT_MAX_PER_MINUTE:-60}
      BOT_RATE_LIMIT_WINDOW_SECONDS: ${BOT_RATE_LIMIT_WINDOW_SECONDS:-60}
      BOT_FEISHU_ENABLED: ${BOT_FEISHU_ENABLED:-false}
      BOT_FEISHU_VERIFICATION_TOKEN: ${BOT_FEISHU_VERIFICATION_TOKEN:-change-me}
      BOT_FEISHU_SIGNING_SECRET: ${BOT_FEISHU_SIGNING_SECRET:-change-me}
      BOT_FEISHU_ALLOWED_MODES: ${BOT_FEISHU_ALLOWED_MODES:-rag,wiki,agent,gbrain}
      BOT_DINGTALK_ENABLED: ${BOT_DINGTALK_ENABLED:-false}
      BOT_DINGTALK_TOKEN: ${BOT_DINGTALK_TOKEN:-change-me}
      BOT_DINGTALK_SIGNING_SECRET: ${BOT_DINGTALK_SIGNING_SECRET:-change-me}
      BOT_DINGTALK_ALLOWED_MODES: ${BOT_DINGTALK_ALLOWED_MODES:-rag,wiki,agent,gbrain}
      BOT_WECHAT_ENABLED: ${BOT_WECHAT_ENABLED:-false}
      BOT_WECHAT_TOKEN: ${BOT_WECHAT_TOKEN:-change-me}
      BOT_WECHAT_SIGNING_SECRET: ${BOT_WECHAT_SIGNING_SECRET:-change-me}
      BOT_WECHAT_ALLOWED_MODES: ${BOT_WECHAT_ALLOWED_MODES:-rag,wiki,agent,gbrain}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  milvus-data:
  milvus-conf:
  etcd-data:
  minio-data:
