version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rag}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Milvus requires both etcd and MinIO for metadata and object storage. We run
  # Milvus in standalone mode which bundles query, data and index services.
  milvus:
    image: milvusdb/milvus:v2.4.0
    restart: always
    ports:
      - "19530:19530"  # gRPC API
      - "19121:19121"  # HTTP/REST API
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_LOG_LEVEL: info
    depends_on:
      - etcd
      - minio
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus-data:/var/lib/milvus
      - milvus-conf:/etc/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: always
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    command: ["etcd", "-advertise-client-urls", "http://0.0.0.0:2379", "-listen-client-urls", "http://0.0.0.0:2379"]
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data

  minio:
    image: minio/minio:RELEASE.2024-03-25T07-52-55Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # Spring Boot picks up these variables automatically; they override values in application.yml
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rag}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      SPRING_REDIS_HOST: redis
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-rag_collection}
      MILVUS_EMBEDDING_DIMENSION: ${MILVUS_EMBEDDING_DIMENSION:-1536}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-bucket}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mysql-data:
  redis-data:
  milvus-data:
  milvus-conf:
  etcd-data:
  minio-data:
