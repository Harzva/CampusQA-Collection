spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/rag?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

milvus:
  host: ${MILVUS_HOST:milvus}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION_NAME:rag_collection}
  embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1536}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:rag-bucket}

openai:
  api-key: ${OPENAI_API_KEY:replace-me}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: campus-agent-qa

bot:
  enabled: ${BOT_ENABLED:false}
  default-mode: ${BOT_DEFAULT_MODE:agent}
  signing-secret: ${BOT_SIGNING_SECRET:}
  timestamp-tolerance-seconds: ${BOT_TIMESTAMP_TOLERANCE_SECONDS:300}
  channels:
    feishu:
      enabled: ${BOT_FEISHU_ENABLED:false}
      token: ${BOT_FEISHU_VERIFICATION_TOKEN:}
      signing-secret: ${BOT_FEISHU_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_FEISHU_ALLOWED_MODES:rag,wiki,agent,gbrain}
    dingtalk:
      enabled: ${BOT_DINGTALK_ENABLED:false}
      token: ${BOT_DINGTALK_TOKEN:}
      signing-secret: ${BOT_DINGTALK_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_DINGTALK_ALLOWED_MODES:rag,wiki,agent,gbrain}
    wechat:
      enabled: ${BOT_WECHAT_ENABLED:false}
      token: ${BOT_WECHAT_TOKEN:}
      signing-secret: ${BOT_WECHAT_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_WECHAT_ALLOWED_MODES:rag,wiki,agent,gbrain}
