spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/rag?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

milvus:
  host: ${MILVUS_HOST:milvus}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION_NAME:rag_collection}
  embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1536}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:rag-bucket}

openai:
  api-key: ${OPENAI_API_KEY:replace-me}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

api:
  auth:
    enabled: ${API_AUTH_ENABLED:true}
    tokens: "${API_AUTH_TOKENS:admin|change-me-admin-token|default|ADMIN,USER}"

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
      probes:
        enabled: true
  metrics:
    tags:
      application: campus-agent-qa
    distribution:
      percentiles-histogram:
        campus.qa.operation.duration: true

logging:
  level:
    com.example.rag: ${APP_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:WARN}

bot:
  enabled: ${BOT_ENABLED:false}
  default-mode: ${BOT_DEFAULT_MODE:agent}
  signing-secret: ${BOT_SIGNING_SECRET:}
  timestamp-tolerance-seconds: ${BOT_TIMESTAMP_TOLERANCE_SECONDS:300}
  idempotency:
    enabled: ${BOT_IDEMPOTENCY_ENABLED:true}
    ttl-seconds: ${BOT_IDEMPOTENCY_TTL_SECONDS:600}
  rate-limit:
    enabled: ${BOT_RATE_LIMIT_ENABLED:true}
    max-per-minute: ${BOT_RATE_LIMIT_MAX_PER_MINUTE:60}
    window-seconds: ${BOT_RATE_LIMIT_WINDOW_SECONDS:60}
  channels:
    feishu:
      enabled: ${BOT_FEISHU_ENABLED:false}
      token: ${BOT_FEISHU_VERIFICATION_TOKEN:}
      signing-secret: ${BOT_FEISHU_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_FEISHU_ALLOWED_MODES:rag,wiki,agent,gbrain}
    dingtalk:
      enabled: ${BOT_DINGTALK_ENABLED:false}
      token: ${BOT_DINGTALK_TOKEN:}
      signing-secret: ${BOT_DINGTALK_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_DINGTALK_ALLOWED_MODES:rag,wiki,agent,gbrain}
    wechat:
      enabled: ${BOT_WECHAT_ENABLED:false}
      token: ${BOT_WECHAT_TOKEN:}
      signing-secret: ${BOT_WECHAT_SIGNING_SECRET:${BOT_SIGNING_SECRET:}}
      allowed-modes: ${BOT_WECHAT_ALLOWED_MODES:rag,wiki,agent,gbrain}
